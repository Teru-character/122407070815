<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>No pain, No gain.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top, #1f2945, #090c14 70%);
    color:white;
    font-family:'Cormorant Garamond', serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

/* 배경 빛 */
.bg-glow{
    position:fixed;
    width:450px;
    height:450px;
    border-radius:50%;
    filter:blur(130px);
    opacity:.12;
    z-index:-1;
    animation:float 8s ease-in-out infinite;
}

.blue{
    background:#4ca7ff;
    top:-100px;
    left:-100px;
}

.yellow{
    background:#ffd84d;
    top:120px;
    right:-120px;
}

.green{
    background:#6eff7c;
    bottom:-100px;
    left:35%;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(25px);}
    100%{transform:translateY(0px);}
}

.container{
    width:100%;
    padding:60px 20px;
    text-align:center;
}

.title{
    font-family:'Great Vibes', cursive;
    font-size:5rem;
    text-shadow:0 0 15px rgba(255,255,255,.2);
    animation:fadeUp 1s ease;
}

.subtitle{
    margin-top:10px;
    opacity:.7;
    letter-spacing:3px;
    margin-bottom:60px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

/* 카드 */
.card{
    width:300px;
    height:440px;
    border-radius:28px;
    overflow:hidden;
    cursor:pointer;

    background:
    linear-gradient(
    180deg,
    rgba(255,255,255,.07),
    rgba(255,255,255,.03));

    border:1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(14px);

    transition:.4s;
    position:relative;
}

.card:hover{
    transform:
    translateY(-12px)
    scale(1.02);
}

/* 게임 UI 느낌 빛 */
.card::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:28px;
    opacity:0;
    transition:.4s;
}

.ax:hover{
    box-shadow:
    0 0 35px rgba(76,167,255,.25);
}

.aiden:hover{
    box-shadow:
    0 0 35px rgba(255,216,77,.25);
}

.david:hover{
    box-shadow:
    0 0 35px rgba(110,255,124,.25);
}

/* 이미지 영역 */
.image-box{
    width:100%;
    height:300px;
    background:rgba(255,255,255,.03);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* 이미지 정상 표시 */
.image-box img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    transition:.4s;
}

.card:hover img{
    transform:scale(1.03);
}

/* 이름 */
.info{
    padding:20px;
}

.name{
    font-size:2.2rem;
}

.color-line{
    width:65px;
    height:3px;
    border-radius:999px;
    margin:12px auto;
}

.ax-line{
    background:#4ca7ff;
}

.aiden-line{
    background:#ffe44c;
}

.david-line{
    background:#7bff84;
}

.enter{
    opacity:.7;
    letter-spacing:2px;
    margin-top:10px;
}

/* 음악 버튼 */
.music-btn{
    position:fixed;
    bottom:25px;
    right:25px;

    border:none;
    border-radius:999px;
    cursor:pointer;

    background:rgba(255,255,255,.08);
    color:white;

    padding:15px 22px;

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.12);

    transition:.3s;
}

.music-btn:hover{
    transform:scale(1.08);
}

/* 등장 애니메이션 */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* 모바일 */
@media(max-width:768px){

.title{
    font-size:3.3rem;
}

.card{
    width:90%;
    max-width:330px;
    height:auto;
}

.image-box{
    height:340px;
}
}
</style>
</head>

<body>

<!-- 배경 -->
<div class="bg-glow blue"></div>
<div class="bg-glow yellow"></div>
<div class="bg-glow green"></div>

<div class="container">

<h1 class="title">
No pain, No gain.
</h1>

<p class="subtitle">
Character Archive
</p>

<div class="cards">

<!-- AX-09 -->
<div class="card ax"
onclick="location.href='ax09.html'">

<div class="image-box">
<img src="ax09.png" alt="Ax-09">
</div>

<div class="info">
<h2 class="name">Ax-09</h2>
<div class="color-line ax-line"></div>
<p class="enter">ENTER PROFILE</p>
</div>
</div>

<!-- 에이든 -->
<div class="card aiden"
onclick="location.href='aiden.html'">

<div class="image-box">
<img src="aiden.png" alt="에이든 필립">
</div>

<div class="info">
<h2 class="name">에이든 필립</h2>
<div class="color-line aiden-line"></div>
<p class="enter">ENTER PROFILE</p>
</div>
</div>

<!-- 다비드 -->
<div class="card david"
onclick="location.href='david.html'">

<div class="image-box">
<img src="david.png" alt="다비드 애셔">
</div>

<div class="info">
<h2 class="name">다비드 애셔</h2>
<div class="color-line david-line"></div>
<p class="enter">ENTER PROFILE</p>
</div>
</div>

</div>
</div>

<!-- BGM -->
<audio id="bgm" autoplay loop>
<source src="bgm.mp3" type="audio/mpeg">
</audio>

<button class="music-btn"
onclick="toggleMusic()">
♫ Music
</button>

<script>
const music =
document.getElementById("bgm");

function toggleMusic(){
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

/* 브라우저 자동재생 제한 대응 */
window.addEventListener("click", () => {
    music.play().catch(() => {});
},{ once:true });
</script>

</body>
</html>
