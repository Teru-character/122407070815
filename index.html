<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>No pain, No gain.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top, #1f2945, #090c14 70%);
    color:white;
    font-family:'Cormorant Garamond', serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

/* 배경 빛 */

.bg-glow{
    position:fixed;
    width:450px;
    height:450px;
    border-radius:50%;
    filter:blur(130px);
    opacity:.12;
    z-index:-1;
    animation:float 8s ease-in-out infinite;
}

.blue{
    background:#4ca7ff;
    top:-100px;
    left:-100px;
}

.yellow{
    background:#ffd84d;
    top:120px;
    right:-120px;
}

.green{
    background:#6eff7c;
    bottom:-100px;
    left:35%;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(25px);}
    100%{transform:translateY(0px);}
}

.container{
    width:100%;
    padding:60px 20px;
    text-align:center;
}

.title{
    font-family:'Great Vibes', cursive;
    font-size:5rem;
    text-shadow:0 0 15px rgba(255,255,255,.2);
    animation:fadeUp 1s ease;
}

.subtitle{
    margin-top:10px;
    opacity:.7;
    letter-spacing:3px;
    margin-bottom:60px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

/* 카드 */

.card{
    width:300px;
    height:440px;
    border-radius:28px;
    overflow:hidden;
    cursor:pointer;

    background:
    linear-gradient(
    180deg,
    rgba(255,255,255,.07),
    rgba(255,255,255,.03));

    border:1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(14px);

    transition:.35s;
    position:relative;
}

.card:hover{
    transform:
    translateY(-12px)
    scale(1.02);
}

.card:active{
    transform:scale(.98);
}

.ax:hover{
    box-shadow:
    0 0 35px rgba(76,167,255,.25);
}

.aiden:hover{
    box-shadow:
    0 0 35px rgba(255,216,77,.25);
}

.david:hover{
    box-shadow:
    0 0 35px rgba(110,255,124,.25);
}

/* 이미지 */

.image-box{
    width:100%;
    height:300px;
    background:rgba(255,255,255,.03);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    transition:.4s;
}

.card:hover img{
    transform:scale(1.03);
}

/* 정보 */

.info{
    padding:20px;
}

.name{
    font-size:2.2rem;
}

.color-line{
    width:65px;
    height:3px;
    border-radius:999px;
    margin:12px auto;
}

.ax-line{
    background:#4ca7ff;
}

.aiden-line{
    background:#ffe44c;
}

.david-line{
    background:#7bff84;
}

.enter{
    opacity:.75;
    letter-spacing:2px;
    margin-top:10px;
    font-size:1rem;
}

/* 음악 버튼 */

.music-btn{
    position:fixed;
    bottom:25px;
    right:25px;

    border:none;
    border-radius:999px;
    cursor:pointer;

    background:rgba(255,255,255,.08);
    color:white;

    padding:15px 22px;

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.12);

    transition:.3s;

    z-index:999;
}

.music-btn:hover{
    transform:scale(1.08);
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
미니게임 영역
========================= */

.mini-game{
    position:relative;
    width:100%;
    height:900px;
    margin-top:120px;
    overflow:hidden;

    border-top:
    1px solid rgba(255,255,255,.08);
}

.game-bg{
    position:absolute;
    inset:0;

    background-image:url('bg_day.jpg');
    background-size:cover;
    background-position:center;

    transition:1s;
    transform:scale(1.02);
}

.game-overlay{
    position:absolute;
    inset:0;

    background:
    linear-gradient(
    to bottom,
    rgba(0,0,0,.15),
    rgba(0,0,0,.6));

    z-index:1;
}

.time-box{
    position:absolute;
    top:40px;
    left:50px;
    z-index:5;
}

#clock{
    font-size:5rem;
    font-weight:700;
}

#timeText{
    opacity:.7;
    font-size:1.2rem;
}

.character-area{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    z-index:4;
}

.character-area img{
    width:500px;
    max-width:90vw;

    animation:
    floatChar 4s ease-in-out infinite;
}

@keyframes floatChar{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

.dialog-box{
    position:absolute;
    bottom:0;
    left:0;

    width:100%;
    padding:35px;

    background:
    rgba(0,0,0,.45);

    backdrop-filter:blur(14px);

    z-index:10;
}

.name-tag{
    font-size:1.5rem;
    margin-bottom:12px;
    color:#ffe178;
}

#dialog{
    font-size:1.6rem;
    line-height:1.6;
    min-height:60px;
}

.buttons{
    margin-top:25px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.buttons button{

    border:none;
    padding:14px 22px;

    border-radius:999px;

    background:
    rgba(255,255,255,.1);

    color:white;

    cursor:pointer;

    font-family:
    'Cormorant Garamond', serif;

    font-size:1rem;

    border:
    1px solid rgba(255,255,255,.1);

    transition:.3s;
}

.buttons button:hover{
    transform:scale(1.06);

    background:
    rgba(255,255,255,.18);
}

/* 모바일 */

@media(max-width:768px){

.title{
    font-size:3.3rem;
}

.card{
    width:90%;
    max-width:330px;
    height:auto;
}

.image-box{
    height:340px;
}

.mini-game{
    height:760px;
}

#clock{
    font-size:3rem;
}

.character-area img{
    width:340px;
}

#dialog{
    font-size:1.2rem;
}

}

</style>
</head>

<body>

<div class="bg-glow blue"></div>
<div class="bg-glow yellow"></div>
<div class="bg-glow green"></div>

<div class="container">

<h1 class="title">
No pain, No gain.
</h1>

<p class="subtitle">
Character Archive
</p>

<div class="cards">

<!-- AX-09 -->
<div class="card ax"
onclick="playVoice('ax09voice')"
ondblclick="location.href='ax09.html'">

<div class="image-box">
<img src="ax09.png" alt="Ax-09">
</div>

<div class="info">
<h2 class="name">Ax-09</h2>
<div class="color-line ax-line"></div>
<p class="enter">!DOUBLE CLICK!</p>
</div>
</div>

<!-- 에이든 -->
<div class="card aiden"
onclick="playVoice('aidenvoice')"
ondblclick="location.href='aiden.html'">

<div class="image-box">
<img src="aiden.png" alt="에이든 필립">
</div>

<div class="info">
<h2 class="name">에이든 필립</h2>
<div class="color-line aiden-line"></div>
<p class="enter">!DOUBLE CLICK!</p>
</div>
</div>

<!-- 다비드 -->
<div class="card david"
onclick="playVoice('davidvoice')"
ondblclick="location.href='david.html'">

<div class="image-box">
<img src="david.png" alt="다비드 애셔">
</div>

<div class="info">
<h2 class="name">다비드 애셔</h2>
<div class="color-line david-line"></div>
<p class="enter">!DOUBLE CLICK!</p>
</div>
</div>

</div>
</div>

<!-- =========================
미니게임
========================= -->

<section class="mini-game">

<div class="game-bg" id="gameBg"></div>

<div class="game-overlay"></div>

<div class="time-box">
<div id="clock">00:00</div>
<p id="timeText">시간 로딩중...</p>
</div>

<div class="character-area">

<img
id="character"
src="char_day.png"
alt="캐릭터">

</div>

<div class="dialog-box">

<div class="name-tag">
에이든 필립
</div>

<p id="dialog">
오늘도 왔네.
</p>

<div class="buttons">

<button onclick="touchCharacter()">
쓰다듬기
</button>

<button onclick="talkCharacter()">
대화하기
</button>

</div>
</div>
</section>

<!-- BGM -->

<audio id="bgm" autoplay loop>
<source src="bgm.mp3" type="audio/mpeg">
</audio>

<!-- 캐릭터 음성 -->

<audio id="ax09voice" src="ax09.mp3"></audio>
<audio id="aidenvoice" src="aiden.mp3"></audio>
<audio id="davidvoice" src="david.mp3"></audio>

<button class="music-btn"
onclick="toggleMusic()">
♫ Music
</button>

<script>

/* =========================
BGM
========================= */

const music =
document.getElementById("bgm");

music.volume = 0.22;

/* =========================
음성
========================= */

const voices = [
    document.getElementById("ax09voice"),
    document.getElementById("aidenvoice"),
    document.getElementById("davidvoice")
];

voices.forEach(v => {
    v.volume = 1.0;
});

/* =========================
음악 버튼
========================= */

function toggleMusic(){

    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

/* 자동재생 대응 */

window.addEventListener("click", () => {
    music.play().catch(() => {});
},{ once:true });

/* =========================
캐릭터 음성
========================= */

function playVoice(id){

    const voice =
    document.getElementById(id);

    voices.forEach(v => {
        v.pause();
        v.currentTime = 0;
    });

    music.volume = 0.08;

    voice.currentTime = 0;
    voice.play();

    voice.onended = () => {
        music.volume = 0.22;
    };
}

/* =========================
미니게임 데이터
========================= */

const phases = {

morning:{
    name:"아침",
    bg:"bg_morning.jpg",
    char:"char_morning.png",
    dialogs:[
        "좋은 아침.",
        "일찍 일어났네.",
        "아직 졸려..."
    ]
},

day:{
    name:"낮",
    bg:"bg_day.jpg",
    char:"char_day.png",
    dialogs:[
        "오늘도 왔네.",
        "무슨 일 있어?",
        "햇빛이 밝네."
    ]
},

evening:{
    name:"저녁",
    bg:"bg_evening.jpg",
    char:"char_evening.png",
    dialogs:[
        "노을이 예쁘다.",
        "오늘 하루 어땠어?",
        "조용하네."
    ]
},

night:{
    name:"밤",
    bg:"bg_night.jpg",
    char:"char_night.png",
    dialogs:[
        "안 자고 있었어?",
        "밤 공기 좋아.",
        "조금 피곤하네."
    ]
}

};

/* =========================
요소
========================= */

const gameBg =
document.getElementById("gameBg");

const character =
document.getElementById("character");

const clock =
document.getElementById("clock");

const timeText =
document.getElementById("timeText");

const dialog =
document.getElementById("dialog");

/* =========================
시간대 판별
========================= */

function getCurrentPhase(hour){

    if(hour >= 5 && hour < 11){
        return phases.morning;
    }

    if(hour >= 11 && hour < 18){
        return phases.day;
    }

    if(hour >= 18 && hour < 21){
        return phases.evening;
    }

    return phases.night;
}

/* =========================
실시간 서울 시간
========================= */

function updateGameTime(){

    const now =
    new Date();

    const seoul =
    new Date(
        now.toLocaleString(
            "en-US",
            {
                timeZone:"Asia/Seoul"
            }
        )
    );

    const hour =
    seoul.getHours();

    const minute =
    seoul.getMinutes();

    const currentPhase =
    getCurrentPhase(hour);

    /* 시계 */

    clock.innerText =
    `${String(hour).padStart(2,"0")}:${String(minute).padStart(2,"0")}`;

    /* 시간대 */

    timeText.innerText =
    currentPhase.name;

    /* 배경 */

    gameBg.style.backgroundImage =
    `url('${currentPhase.bg}')`;

    /* 캐릭터 */

    character.src =
    currentPhase.char;
}

/* =========================
대화하기
========================= */

function talkCharacter(){

    const now =
    new Date();

    const seoul =
    new Date(
        now.toLocaleString(
            "en-US",
            {
                timeZone:"Asia/Seoul"
            }
        )
    );

    const hour =
    seoul.getHours();

    const currentPhase =
    getCurrentPhase(hour);

    dialog.innerText =
    currentPhase.dialogs[
        Math.floor(
            Math.random()
            * currentPhase.dialogs.length
        )
    ];
}

/* =========================
쓰다듬기
========================= */

function touchCharacter(){

    character.style.transform =
    "scale(1.05)";

    dialog.innerText =
    "......";

    setTimeout(()=>{

        character.style.transform =
        "scale(1)";

        dialog.innerText =
        "왜 그래?";

    },300);
}

/* =========================
시작
========================= */

updateGameTime();

setInterval(updateGameTime,1000);

</script>

</body>
</html>
